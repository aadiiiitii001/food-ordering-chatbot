<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zestora — Smart Food Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ──────────────────────────────────────────────────────── */
    :root {
      --bg:        #0f0e0c;
      --surface:   #1a1916;
      --surface2:  #242320;
      --accent:    #e8703a;
      --accent2:   #f0a05a;
      --text:      #f2ede6;
      --muted:     #8a8070;
      --bot-bg:    #1f1e1b;
      --user-bg:   #e8703a;
      --radius:    18px;
      --font-head: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }
 
    /* ── Reset ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
 
    body {
      font-family: var(--font-body);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
 
    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }
 
    /* ── Shell ───────────────────────────────────────────────────────── */
    .shell {
      position: relative;
      z-index: 1;
      width: 420px;
      max-width: 100%;
      height: 680px;
      max-height: 92vh;
      background: var(--surface);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(232,112,58,0.08),
        0 32px 80px rgba(0,0,0,0.6);
    }
 
    /* ── Header ──────────────────────────────────────────────────────── */
    .header {
      padding: 22px 24px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
 
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }
 
    .logo-mark {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
 
    .brand h1 {
      font-family: var(--font-head);
      font-size: 20px;
      color: var(--text);
      font-weight: 400;
      letter-spacing: 0.01em;
    }
 
    .brand p {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
      margin-top: 1px;
    }
 
    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }
 
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #5cb85c;
      animation: pulse-dot 2s ease-in-out infinite;
    }
 
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
 
    /* quick-action chips */
    .chips {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
 
    .chip {
      font-size: 11px;
      font-family: var(--font-body);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--surface2);
      border-radius: 20px;
      padding: 4px 12px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
 
    .chip:hover {
      color: var(--accent2);
      border-color: rgba(232,112,58,0.35);
      background: rgba(232,112,58,0.08);
    }
 
    /* ── Chat body ───────────────────────────────────────────────────── */
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
 
    .chat-body::-webkit-scrollbar { width: 4px; }
    .chat-body::-webkit-scrollbar-track { background: transparent; }
    .chat-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
 
    /* ── Messages ────────────────────────────────────────────────────── */
    .msg {
      max-width: 80%;
      padding: 11px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      animation: rise 0.28s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
 
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .msg.bot {
      align-self: flex-start;
      background: var(--bot-bg);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.06);
      border-bottom-left-radius: 5px;
    }
 
    .msg.user {
      align-self: flex-end;
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 5px;
    }
 
    /* timestamp */
    .msg-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
 
    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.bot  { align-items: flex-start; }
 
    .msg-time {
      font-size: 10px;
      color: var(--muted);
      padding: 0 4px;
      opacity: 0.7;
    }
 
    /* typing indicator */
    .typing-dots {
      align-self: flex-start;
      background: var(--bot-bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      border-bottom-left-radius: 5px;
      padding: 13px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
      animation: rise 0.2s ease both;
    }
 
    .typing-dots span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.1s ease-in-out infinite;
    }
 
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
 
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-5px); opacity: 1; }
    }
 
    /* ── Input bar ───────────────────────────────────────────────────── */
    .input-bar {
      flex-shrink: 0;
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: center;
    }
 
    .input-bar input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 11px 18px;
      outline: none;
      transition: border-color 0.2s;
    }
 
    .input-bar input::placeholder { color: var(--muted); }
    .input-bar input:focus { border-color: rgba(232,112,58,0.4); }
 
    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
 
    .send-btn:hover  { background: var(--accent2); }
    .send-btn:active { transform: scale(0.92); }
 
    .send-btn svg {
      width: 18px; height: 18px;
      fill: white;
      transform: translateX(1px);
    }
 
    /* ── Empty state ─────────────────────────────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }
 
    .empty-state svg {
      width: 48px; height: 48px;
      opacity: 0.18;
    }
  </style>
</head>
 
<body>
  <div class="shell">
 
    <!-- Header -->
    <div class="header">
      <div class="header-top">
        <div class="logo-mark">🍽</div>
        <div class="brand">
          <h1>Zestora</h1>
          <p>Smart Food Assistant</p>
        </div>
        <div class="status-dot">
          <div class="dot"></div>
          Online
        </div>
      </div>
      <div class="chips">
        <button class="chip" onclick="quickSend('show menu')">📋 Menu</button>
        <button class="chip" onclick="quickSend('show cart')">🛒 My cart</button>
        <button class="chip" onclick="quickSend('recommend me something')">✨ Suggest</button>
        <button class="chip" onclick="quickSend('checkout')">✅ Checkout</button>
      </div>
    </div>
 
    <!-- Chat body -->
    <div class="chat-body" id="chat-body">
      <!-- Welcome message injected by JS -->
    </div>
 
    <!-- Input -->
    <div class="input-bar">
      <input
        id="msg-input"
        type="text"
        placeholder="Type a message…"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button class="send-btn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
 
  <script>
    const chatBody   = document.getElementById('chat-body');
    const msgInput   = document.getElementById('msg-input');
    let   typingEl   = null;
 
    // ── Helpers ──────────────────────────────────────────────────────────────
 
    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
 
    function scrollBottom() {
      chatBody.scrollTop = chatBody.scrollHeight;
    }
 
    function appendMsg(text, role) {
      const wrap = document.createElement('div');
      wrap.className = `msg-wrap ${role}`;
 
      const bubble = document.createElement('div');
      bubble.className = `msg ${role}`;
      bubble.textContent = text;
 
      const time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = getTime();
 
      wrap.appendChild(bubble);
      wrap.appendChild(time);
      chatBody.appendChild(wrap);
      scrollBottom();
      return wrap;
    }
 
    function showTyping() {
      typingEl = document.createElement('div');
      typingEl.className = 'typing-dots';
      typingEl.innerHTML = '<span></span><span></span><span></span>';
      chatBody.appendChild(typingEl);
      scrollBottom();
    }
 
    function hideTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null; }
    }
 
    function quickSend(text) {
      msgInput.value = text;
      sendMessage();
    }
 
    // ── Core send ────────────────────────────────────────────────────────────
 
    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;
 
      appendMsg(text, 'user');
      msgInput.value = '';
      showTyping();
 
      try {
        const res  = await fetch('/chat', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ message: text }),
        });
        const data = await res.json();
        hideTyping();
        appendMsg(data.reply, 'bot');
      } catch {
        hideTyping();
        appendMsg('⚠️ Could not reach the server. Please try again.', 'bot');
      }
    }
 
    // ── Boot ─────────────────────────────────────────────────────────────────
 
    window.addEventListener('DOMContentLoaded', () => {
      appendMsg("👋 Hi! I'm Zestora, your food assistant.\nTap a quick action above or tell me what you'd like to order!", 'bot');
      msgInput.focus();
    });
  </script>
</body>
</html>
